{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentlens.fullname" . }}-secret
  labels:
    app.kubernetes.io/name: {{ include "agentlens.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  encryption-key: {{ .Values.secret.encryptionKey | b64enc | quote }}
{{- end }}
